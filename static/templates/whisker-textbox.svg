<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 160" width="512" height="160">
  <!-- ひげテキストボックス (Whisker Textbox) -->
  <!-- テキストボックス本体 -->
  <rect x="80" y="40" width="352" height="80" rx="16" ry="16" fill="#16213E" stroke="#FFB7C5" stroke-width="3"/>
  <!-- 左ひげ1 -->
  <line x1="80" y1="72" x2="12" y2="60" stroke="#C4A8D4" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 左ひげ2 -->
  <line x1="80" y1="80" x2="4" y2="80" stroke="#C4A8D4" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 左ひげ3 -->
  <line x1="80" y1="88" x2="12" y2="100" stroke="#C4A8D4" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 右ひげ1 -->
  <line x1="432" y1="72" x2="500" y2="60" stroke="#C4A8D4" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 右ひげ2 -->
  <line x1="432" y1="80" x2="508" y2="80" stroke="#C4A8D4" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 右ひげ3 -->
  <line x1="432" y1="88" x2="500" y2="100" stroke="#C4A8D4" stroke-width="2.5" stroke-linecap="round"/>
  <!-- 肉球デコレーション（左上） -->
  <circle cx="97" cy="52" r="6" fill="#E87DA0"/>
  <!-- プレースホルダーテキスト -->
  <text x="256" y="86" font-family="Nunito, sans-serif" font-size="20" fill="#888" text-anchor="middle">にゃんと入力...</text>
  <!-- カーソル -->
  <line x1="330" y1="66" x2="330" y2="94" stroke="#FFB7C5" stroke-width="2"/>
</svg>
